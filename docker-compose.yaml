services:
  pocket-tts:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - pocket_tts_cache:/root/.cache/pocket_tts
      - hf_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  pocket_tts_cache:
  hf_cache:
